<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cronômetro 46.6s</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --panel:     #111111;
      --border:    #222222;
      --neutral:   #e8e0d0;
      --accent:    #ff4e00;
      --green:     #00ff88;
      --dim:       #444444;
      --glow-red:  rgba(255,78,0,0.35);
      --glow-grn:  rgba(0,255,136,0.35);
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      color: var(--neutral);
      overflow: hidden;
      position: relative;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(255,255,255,0.015) 3px,
        rgba(255,255,255,0.015) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* noise grain */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 99;
      opacity: 0.5;
    }

    .wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* top label bar */
    .label-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
      letter-spacing: 0.3em;
      font-size: 0.72rem;
      color: var(--dim);
      text-transform: uppercase;
    }
    .label-bar span.dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      transition: background 0.4s;
    }
    .label-bar span.dot.green { background: var(--green); }

    /* main panel */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 52px 72px 44px;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
    }

    .panel::before {
      content: '';
      position: absolute;
      inset: 0;
      clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
      background: linear-gradient(135deg, rgba(255,78,0,0.04) 0%, transparent 60%);
      pointer-events: none;
      transition: background 0.5s;
    }
    .panel.green-mode::before {
      background: linear-gradient(135deg, rgba(0,255,136,0.06) 0%, transparent 60%);
    }

    /* corner brackets */
    .corner {
      position: absolute;
      width: 16px; height: 16px;
      border-color: var(--accent);
      border-style: solid;
      transition: border-color 0.4s;
    }
    .corner.tl { top: 6px;  left: 6px;  border-width: 2px 0 0 2px; }
    .corner.tr { top: 6px;  right: 6px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 6px; left: 6px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; }
    .panel.green-mode .corner { border-color: var(--green); }

    /* time display */
    .time-display {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(100px, 22vw, 200px);
      line-height: 0.9;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-shadow:
        0 0 40px var(--glow-red),
        0 0 80px rgba(255,78,0,0.15);
      transition: color 0.4s, text-shadow 0.4s;
      user-select: none;
      position: relative;
    }

    .time-display.green {
      color: var(--green);
      text-shadow:
        0 0 40px var(--glow-grn),
        0 0 80px rgba(0,255,136,0.15);
    }

    /* milliseconds sub-display */
    .ms-display {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(36px, 7vw, 68px);
      letter-spacing: 0.1em;
      color: var(--accent);
      opacity: 0.7;
      text-align: right;
      margin-top: -8px;
      transition: color 0.4s;
    }
    .ms-display.green { color: var(--green); }

    /* progress bar */
    .progress-wrap {
      width: 100%;
      height: 4px;
      background: #1e1e1e;
      margin-top: 28px;
      position: relative;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--glow-red);
      transition: background 0.4s, box-shadow 0.4s;
    }
    .progress-fill.green {
      background: var(--green);
      box-shadow: 0 0 10px var(--glow-grn);
    }

    /* lap markers on progress bar */
    .marker-32 {
      position: absolute;
      top: -3px;
      left: calc(32 / 46.6 * 100%);
      width: 2px;
      height: 10px;
      background: var(--neutral);
      opacity: 0.4;
    }

    /* status row */
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      color: var(--dim);
      text-transform: uppercase;
    }
    .status-row .lap-count { color: var(--neutral); opacity: 0.5; }

    /* start button */
    .btn-wrap {
      margin-top: 40px;
    }

    .btn-start {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Bebas Neue', cursive;
      font-size: 1.4rem;
      letter-spacing: 0.3em;
      padding: 14px 52px;
      cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      position: relative;
      overflow: hidden;
      transition: color 0.3s, border-color 0.3s, background 0.3s;
    }

    .btn-start::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .btn-start:hover::before { opacity: 0.12; }
    .btn-start:active::before { opacity: 0.25; }

    .btn-start span { position: relative; z-index: 1; }

    .btn-start.running {
      border-color: var(--dim);
      color: var(--dim);
      cursor: default;
    }
    .btn-start.running::before { display: none; }

    /* cycle flash overlay */
    @keyframes flashCycle {
      0%   { opacity: 0.18; }
      100% { opacity: 0; }
    }
    .flash-overlay {
      position: fixed; inset: 0;
      background: var(--green);
      opacity: 0;
      pointer-events: none;
      z-index: 90;
    }
    .flash-overlay.flash { animation: flashCycle 0.35s ease-out forwards; }

    /* pulse ring on time */
    @keyframes pulseRing {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(1.06); opacity: 0; }
    }
    .time-display.pulse-anim::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 2px solid currentColor;
      animation: pulseRing 0.5s ease-out;
    }
  </style>
</head>
<body>

<div class="flash-overlay" id="flashOverlay"></div>

<div class="wrapper">
  <div class="label-bar">
    <span>CRONÔMETRO</span>
    <span class="dot" id="statusDot"></span>
    <span id="statusLabel">AGUARDANDO</span>
  </div>

  <div class="panel" id="panel">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="time-display" id="timeDisplay">00</div>
    <div class="ms-display"   id="msDisplay">.0</div>

    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill"></div>
      <div class="marker-32"></div>
    </div>

    <div class="status-row">
      <span id="cycleLabel">CICLO&nbsp;—</span>
      <span class="lap-count" id="lapCount">0 CICLOS</span>
    </div>
  </div>

  <div class="btn-wrap">
    <button class="btn-start" id="btnStart" onclick="startTimer()">
      <span>▶ INICIAR</span>
    </button>
  </div>
</div>

<script>
  const TOTAL = 46.6;          // seconds per cycle
  const GREEN_AT = 32;         // seconds — turn green

  let startTime   = null;
  let elapsed     = 0;
  let cycleStart  = null;
  let cycleCount  = 0;
  let rafId       = null;
  let running     = false;

  const timeDisplay  = document.getElementById('timeDisplay');
  const msDisplay    = document.getElementById('msDisplay');
  const progressFill = document.getElementById('progressFill');
  const statusDot    = document.getElementById('statusDot');
  const statusLabel  = document.getElementById('statusLabel');
  const lapCount     = document.getElementById('lapCount');
  const cycleLabel   = document.getElementById('cycleLabel');
  const panel        = document.getElementById('panel');
  const btnStart     = document.getElementById('btnStart');
  const flashOverlay = document.getElementById('flashOverlay');

  function setGreen(on) {
    if (on) {
      timeDisplay.classList.add('green');
      msDisplay.classList.add('green');
      progressFill.classList.add('green');
      panel.classList.add('green-mode');
      statusDot.classList.add('green');
    } else {
      timeDisplay.classList.remove('green');
      msDisplay.classList.remove('green');
      progressFill.classList.remove('green');
      panel.classList.remove('green-mode');
      statusDot.classList.remove('green');
    }
  }

  function flash() {
    flashOverlay.classList.remove('flash');
    void flashOverlay.offsetWidth; // reflow
    flashOverlay.classList.add('flash');
  }

  function startTimer() {
    if (running) return;
    running    = true;
    cycleStart = performance.now();
    cycleCount = 0;

    btnStart.classList.add('running');
    btnStart.querySelector('span').textContent = '● EM EXECUÇÃO';
    statusLabel.textContent = 'RODANDO';

    rafId = requestAnimationFrame(tick);
  }

  function tick(now) {
    const cycleElapsed = (now - cycleStart) / 1000; // seconds

    // check if cycle finished
    if (cycleElapsed >= TOTAL) {
      cycleCount++;
      cycleStart += TOTAL * 1000; // keep perfect timing — no drift
      flash();
      setGreen(false);
    }

    const t   = ((now - cycleStart) / 1000);
    const sec = Math.floor(t);
    const dec = Math.floor((t % 1) * 10);

    // update display
    timeDisplay.textContent = String(sec).padStart(2, '0');
    msDisplay.textContent   = '.' + dec;

    // progress bar
    const pct = Math.min(t / TOTAL * 100, 100);
    progressFill.style.width = pct + '%';

    // green threshold
    setGreen(t >= GREEN_AT);

    // cycle count label
    lapCount.textContent  = cycleCount + (cycleCount === 1 ? ' CICLO' : ' CICLOS');
    cycleLabel.textContent = 'CICLO ' + (cycleCount + 1);

    rafId = requestAnimationFrame(tick);
  }
</script>
</body>
</html>
