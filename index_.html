<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cronômetro 40s</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    .title {
      color: #888;
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .ring-wrapper {
      position: relative;
      width: 280px;
      height: 280px;
    }

    svg.ring {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-bg {
      fill: none;
      stroke: #1e1e1e;
      stroke-width: 10;
    }

    .ring-progress {
      fill: none;
      stroke: #00e5ff;
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 754;
      stroke-dashoffset: 0;
      transition: stroke 0.3s ease;
      filter: drop-shadow(0 0 8px #00e5ff88);
    }

    .ring-progress.alert {
      stroke: #ff4444;
      filter: drop-shadow(0 0 12px #ff444499);
    }

    .center-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .time-text {
      font-size: 72px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -2px;
      line-height: 1;
      transition: color 0.3s;
    }

    .time-text.alert {
      color: #ff4444;
    }

    .label-text {
      font-size: 12px;
      color: #555;
      letter-spacing: 3px;
      margin-top: 6px;
    }

    .sound-indicator {
      position: absolute;
      bottom: -32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      align-items: flex-end;
      height: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .sound-indicator.active {
      opacity: 1;
    }

    .bar {
      width: 4px;
      background: #ff4444;
      border-radius: 2px;
      animation: bounce 0.4s ease infinite alternate;
    }

    .bar:nth-child(1) { height: 8px;  animation-delay: 0s; }
    .bar:nth-child(2) { height: 16px; animation-delay: 0.1s; }
    .bar:nth-child(3) { height: 20px; animation-delay: 0.05s; }
    .bar:nth-child(4) { height: 14px; animation-delay: 0.15s; }
    .bar:nth-child(5) { height: 10px; animation-delay: 0.08s; }

    @keyframes bounce {
      from { transform: scaleY(0.4); }
      to   { transform: scaleY(1); }
    }

    /* Aviso de voz */
    .voice-toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: #1a1a1a;
      border: 1px solid #00e5ff33;
      color: #00e5ff;
      padding: 10px 24px;
      border-radius: 50px;
      font-size: 13px;
      letter-spacing: 1px;
      transition: transform 0.35s cubic-bezier(.4,2,.6,1), opacity 0.35s;
      opacity: 0;
      white-space: nowrap;
      pointer-events: none;
    }

    .voice-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Controles */
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 12px 28px;
      border: none;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start {
      background: #00e5ff;
      color: #000;
    }

    .btn-start:hover {
      background: #00cfea;
      box-shadow: 0 0 20px #00e5ff55;
    }

    .btn-reset {
      background: transparent;
      color: #555;
      border: 1px solid #2a2a2a;
    }

    .btn-reset:hover {
      border-color: #555;
      color: #aaa;
    }

    /* Botão Loop */
    .btn-loop {
      background: transparent;
      color: #555;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-loop:hover {
      border-color: #555;
      color: #aaa;
    }

    .btn-loop.on {
      background: #1a2e1a;
      color: #44ff88;
      border-color: #44ff8855;
      box-shadow: 0 0 12px #44ff8822;
    }

    .loop-icon {
      font-size: 15px;
      line-height: 1;
    }

    /* Info de loop */
    .loop-info {
      font-size: 11px;
      color: #333;
      letter-spacing: 2px;
      height: 14px;
      transition: color 0.3s;
    }

    .loop-info.on {
      color: #44ff8866;
    }

    .status {
      font-size: 13px;
      color: #444;
      letter-spacing: 2px;
      height: 18px;
      transition: color 0.3s;
    }

    .status.active { color: #00e5ff; }
    .status.alert  { color: #ff4444; }
    .status.loop   { color: #44ff88; }
  </style>
</head>
<body>

<div class="voice-toast" id="voiceToast">🔊 —</div>

<div class="container">
  <span class="title">Cronômetro</span>

  <div class="ring-wrapper">
    <svg class="ring" viewBox="0 0 260 260">
      <circle class="ring-bg" cx="130" cy="130" r="120"/>
      <circle class="ring-progress" id="ringProgress" cx="130" cy="130" r="120"/>
    </svg>

    <div class="center-display">
      <div class="time-text" id="timeDisplay">40</div>
      <div class="label-text">SEGUNDOS</div>
    </div>

    <div class="sound-indicator" id="soundIndicator">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-start" id="btnStart" onclick="toggleTimer()">INICIAR</button>
    <button class="btn-reset" onclick="resetTimer()">RESETAR</button>
    <button class="btn-loop" id="btnLoop" onclick="toggleLoop()">
      <span class="loop-icon">↻</span> LOOP
    </button>
  </div>

  <span class="loop-info" id="loopInfo">LOOP DESATIVADO</span>
  <span class="status" id="status">AGUARDANDO</span>
</div>

<script>
  const TOTAL          = 40;
  const ALERT_DURATION = 6;
  const CIRCUMFERENCE  = 2 * Math.PI * 120;

  // Anunciar a cada múltiplo de 10s (exceto 0, que é o alarme)
  const ANNOUNCE_AT = [30, 20, 10];

  let remaining    = TOTAL;
  let running      = false;
  let loopEnabled  = false;
  let interval     = null;
  let audioCtx     = null;
  let alarmNodes   = [];
  let alarmTimeout = null;
  let toastTimeout = null;

  const ringProgress   = document.getElementById('ringProgress');
  const timeDisplay    = document.getElementById('timeDisplay');
  const btnStart       = document.getElementById('btnStart');
  const btnLoop        = document.getElementById('btnLoop');
  const status         = document.getElementById('status');
  const loopInfo       = document.getElementById('loopInfo');
  const soundIndicator = document.getElementById('soundIndicator');
  const voiceToast     = document.getElementById('voiceToast');

  ringProgress.style.strokeDasharray = CIRCUMFERENCE;
  updateRing(TOTAL);

  // ── Web Speech API ──────────────────────────────────────────────
  function speak(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang  = 'pt-BR';
    utter.rate  = 1.1;
    utter.pitch = 1;
    window.speechSynthesis.speak(utter);
    showToast('🔊 ' + text);
  }

  function showToast(msg) {
    voiceToast.textContent = msg;
    voiceToast.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => voiceToast.classList.remove('show'), 2800);
  }

  // ── Áudio de alarme ─────────────────────────────────────────────
  function getAudioContext() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playAlarm() {
    const ctx = getAudioContext();
    alarmNodes = [];

    function beepCycle(startTime) {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(880, startTime);
      osc.frequency.setValueAtTime(660, startTime + 0.15);
      gain.gain.setValueAtTime(0.3, startTime);
      gain.gain.setValueAtTime(0, startTime + 0.3);
      osc.start(startTime);
      osc.stop(startTime + 0.3);
      alarmNodes.push(osc);
    }

    const now = ctx.currentTime;
    for (let i = 0; i < 10; i++) beepCycle(now + i * 0.6);
  }

  function stopAlarm() {
    alarmNodes.forEach(n => { try { n.stop(); } catch(e) {} });
    alarmNodes = [];
    if (alarmTimeout) { clearTimeout(alarmTimeout); alarmTimeout = null; }
  }

  // ── Anel de progresso ───────────────────────────────────────────
  function updateRing(secs) {
    const offset = CIRCUMFERENCE * (1 - secs / TOTAL);
    ringProgress.style.strokeDashoffset = offset;
  }

  function setAlertMode(on) {
    ringProgress.classList.toggle('alert', on);
    timeDisplay.classList.toggle('alert', on);
    soundIndicator.classList.toggle('active', on);
  }

  // ── Loop ────────────────────────────────────────────────────────
  function toggleLoop() {
    loopEnabled = !loopEnabled;
    btnLoop.classList.toggle('on', loopEnabled);
    loopInfo.textContent = loopEnabled ? 'LOOP ATIVADO' : 'LOOP DESATIVADO';
    loopInfo.classList.toggle('on', loopEnabled);
  }

  // ── Timer ───────────────────────────────────────────────────────
  function toggleTimer() {
    running ? pauseTimer() : startTimer();
  }

  function startTimer() {
    running = true;
    btnStart.textContent = 'PAUSAR';
    status.textContent   = 'EM EXECUÇÃO';
    status.className     = 'status active';

    interval = setInterval(() => {
      remaining--;
      timeDisplay.textContent = remaining;
      updateRing(remaining);

      // Anúncio de voz a cada 10s
      if (ANNOUNCE_AT.includes(remaining)) {
        const falta = remaining; // segundos restantes no cronômetro
        speak(`Faltam ${falta} segundos`);
      }

      if (remaining === 0) {
        clearInterval(interval);
        running = false;
        btnStart.textContent = 'INICIAR';
        status.textContent   = 'ALARME';
        status.className     = 'status alert';
        setAlertMode(true);
        playAlarm();
        speak('Tempo esgotado!');

        alarmTimeout = setTimeout(() => {
          stopAlarm();
          if (loopEnabled) {
            // reinicia automaticamente
            remaining = TOTAL;
            timeDisplay.textContent = TOTAL;
            updateRing(TOTAL);
            setAlertMode(false);
            status.textContent = 'EM EXECUÇÃO';
            status.className   = 'status active';
            startTimer();
          } else {
            resetTimer();
          }
        }, ALERT_DURATION * 1000);
      }
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(interval);
    running = false;
    btnStart.textContent = 'RETOMAR';
    status.textContent   = 'PAUSADO';
    status.className     = 'status';
  }

  function resetTimer() {
    clearInterval(interval);
    stopAlarm();
    window.speechSynthesis && window.speechSynthesis.cancel();
    running   = false;
    remaining = TOTAL;
    timeDisplay.textContent = TOTAL;
    updateRing(TOTAL);
    setAlertMode(false);
    btnStart.textContent = 'INICIAR';
    status.textContent   = 'AGUARDANDO';
    status.className     = 'status';
  }
</script>

</body>
</html>
